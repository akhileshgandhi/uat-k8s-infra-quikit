apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-runtime-deployment
  namespace: quikit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-runtime
  template:
    metadata:
      labels:
        app: ai-runtime
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "global-role"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/quikit/ai"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/quikit/ai" -}}
          {{- range $k, $v := .Data.data }}
          export {{ $k }}="{{ $v }}"
          {{- end }}
          {{- end }}
    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: ai-runtime
          image: ghcr.io/akhileshgandhi/ai-runtime:v2
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -c
            - |
              set -a
              . /vault/secrets/config
              set +a

              exec uvicorn app.main:app \
                --host 0.0.0.0 \
                --port 8065 \
                --workers "${UVICORN_WORKERS:-2}" \
                --log-level info \
                --no-access-log

          ports:
            - containerPort: 8065

          # envFrom:
          #   - configMapRef:
          #       name: quikit-config

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8065
            initialDelaySeconds: 45
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /health
              port: 8065
            initialDelaySeconds: 15
            periodSeconds: 10