apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-deployment
  namespace: quikit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: socket
  template:
    metadata:
      labels:
        app: socket
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "global-role"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/quikit/auth-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/quikit/auth-service" -}}
          {{- range $k, $v := .Data.data }}
          export {{ $k }}="{{ $v }}"
          {{- end }}
          {{- end }}

    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: socket
        image: ghcr.io/akhileshgandhi/realtime-runtime:sha-8baa41c

        command:
        - /bin/sh
        - -c
        - |
          set -a
          . /vault/secrets/config
          set +a
          cd /app/apps/realtime
          exec node server.js

        ports:
        - containerPort: 9100

        envFrom:
        - configMapRef:
            name: quikit-config

        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /api/health
            port: 9100
          initialDelaySeconds: 45
          periodSeconds: 20

        readinessProbe:
          httpGet:
            path: /api/health
            port: 9100
          initialDelaySeconds: 15
          periodSeconds: 10
