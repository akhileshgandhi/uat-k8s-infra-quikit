apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-deployment
  namespace: quikit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: admin
          image: ghcr.io/ashwinsingone-pm/admin-runtime:sha-597eacf
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: quikit-secrets
            - configMapRef:
                name: quikit-config
          env:
            - name: NEXTAUTH_URL
              value: "https://uatorgadmin.quikit.ai"
            # OAuth sub-app identity to the launcher's IdP.
            - name: QUIKIT_CLIENT_ID
              value: "admin"
            - name: QUIKIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quikit-secrets
                  key: ADMIN_CLIENT_SECRET
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3002
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10