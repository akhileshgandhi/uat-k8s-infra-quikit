apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-deployment
  namespace: quikit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "global-role"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/quikit/auth-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/quikit/auth-service" -}}
          {{- range $k, $v := .Data.data }}
          export {{ $k }}="{{ $v }}"
          {{- end }}
          {{- end }}
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: chat
          image: ghcr.io/akhileshgandhi/quikchat-runtime:sha-20b4078
          command:
            - /bin/sh
            - -c
            - |
              set -a
              . /vault/secrets/config
              set +a
              cd /app/apps/quikchat
              exec node server.js
          ports:
            - containerPort: 3011
          envFrom:
            - configMapRef:
                name: quikit-config
          env:
            - name: NEXTAUTH_URL
              value: "https://uatchat.quikit.ai"
            - name: QUIKIT_CLIENT_ID
              value: "quikchat"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3011
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3011
            initialDelaySeconds: 15
            periodSeconds: 10
