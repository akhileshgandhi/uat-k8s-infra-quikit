apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiktrack-deployment
  namespace: quikit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quiktrack
  template:
    metadata:
      labels:
        app: quiktrack
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: quiktrack
          image: ghcr.io/ashwinsingone-pm/quiktrack-runtime:sha-ec38007 
          ports:
            - containerPort: 3004
          # AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY come from
          # quikit-secrets; AWS_REGION + AWS_S3_BUCKET come from
          # quikit-config (non-secret).
          envFrom:
            - secretRef:
                name: quikit-secrets
            - configMapRef:
                name: quikit-config
          env:
            - name: NEXTAUTH_URL
              value: "https://uattrack.quikit.ai"
            - name: NEXT_PUBLIC_QUIKTRACK_URL
              value: "https://uattrack.quikit.ai"
            # OAuth sub-app identity.
            - name: QUIKIT_CLIENT_ID
              value: "quiktrack"
            - name: QUIKIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quikit-secrets
                  key: QUIKTRACK_CLIENT_SECRET
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3004
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: quiktrack-service
  namespace: quikit
  annotations:
    cloud.google.com/backend-config: '{"default": "quikit-backend-config"}'
spec:
  selector:
    app: quiktrack
  ports:
    - protocol: TCP
      port: 3004
      targetPort: 3004
  type: NodePort

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quiktrack-hpa
  namespace: quikit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quiktrack-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70