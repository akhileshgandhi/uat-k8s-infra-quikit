apiVersion: apps/v1
kind: Deployment
metadata:
  name: quikscale-deployment
  namespace: quikit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quikscale
  template:
    metadata:
      labels:
        app: quikscale
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: quikscale
          image: ghcr.io/ashwinsingone-pm/quikscale-runtime:sha-ec38007
          ports:
            - containerPort: 3003
          # quikscale's email module reads EMAIL_USER / EMAIL_PASSWORD_B64
          # (outlier from the SMTP_* convention used by every other app).
          # Both come from quikit-secrets.
          envFrom:
            - secretRef:
                name: quikit-secrets
            - configMapRef:
                name: quikit-config
          env:
            - name: NEXTAUTH_URL
              value: "https://uatscale.quikit.ai"
            # - name: NEXT_PUBLIC_QUIKSCALE_URL
            #   value: "https://scale.quikit.ai"
            # OAuth sub-app identity.
            - name: QUIKIT_CLIENT_ID
              value: "quikscale"
            - name: QUIKIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quikit-secrets
                  key: QUIKSCALE_CLIENT_SECRET
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: quikscale-service
  namespace: quikit
  annotations:
    cloud.google.com/backend-config: '{"default": "quikit-backend-config"}'
spec:
  selector:
    app: quikscale
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003
  type: NodePort

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quikscale-hpa
  namespace: quikit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quikscale-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
