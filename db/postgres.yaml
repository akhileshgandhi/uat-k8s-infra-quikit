apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: pg18-cluster
  namespace: db

spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:18.4
  enableSuperuserAccess: true
  affinity:
    nodeSelector:
      kubernetes.io/hostname: worker2

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  storage:
    size: 10Gi
    storageClass: local-path