apiVersion: v1
kind: ConfigMap
metadata:
  name: quikit-config
  namespace: quikit
data:
   NEXT_PUBLIC_LAUNCHER_URL: "https://uatapps.quikit.ai"
   NEXT_PUBLIC_AUTH_URL: "https://uatauthn.quikit.ai"
   NEXT_PUBLIC_QUIKIT_URL: "https://uatapps.quikit.ai"
   NEXT_PUBLIC_ADMIN_URL: "https://uatorgadmin.quikit.ai"
   NEXT_PUBLIC_QUIKSCALE_URL: "https://uatscale.quikit.ai"
   NEXT_PUBLIC_LOGIN_URL: "https://uatauthn.quikit.ai/login"
   NEXT_PUBLIC_SUPER_ADMIN_URL: "https://uatorgadmin.quikit.ai"
   NEXT_PUBLIC_QUIKCRM_URL: "https://uatcrm.quikit.ai"
   NEXT_PUBLIC_QUIKHRMS_URL: "https://uatpeople.quikit.ai"
   # Server-side mirrors (no NEXT_PUBLIC_ prefix — read by route handlers
   # and lib code that doesn't run in the browser).
   QUIKIT_URL: "https://uatapps.quikit.ai"
   ADMIN_URL: "https://uatorgadmin.quikit.ai"
   QUIKSCALE_URL: "https://uatscale.quikit.ai"
   QUIKTRACK_URL: "https://uattrack.quikit.ai"
   QUIKCRM_URL: "https://uatcrm.quikit.ai"
   QUIKINFRA_URL: "https://uatinfra.quikit.ai"
   QUIKSOCIAL_URL: "https://uatsocial.quikit.ai"
   QUIKHRMS_URL: "https://uatpeople.quikit.ai"

   # OAuth issuer (sub-apps point their OIDC client at this).
   QUIKIT_ISSUER_URL: "https://uatapps.quikit.ai"
   # AWS region + bucket (non-secret; secrets go in the Secret).
   AWS_REGION: "ap-south-1"
   AWS_S3_BUCKET: "quikit-bucket"


